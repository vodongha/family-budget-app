name: family_budget_app
description: Family Budget — multi-member household expense tracker (Flutter client for the family-budget FastAPI backend).
publish_to: "none"
version: 1.0.0+9

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  # Localization (en/vi) — generated AppLocalizations from lib/l10n/*.arb.
  flutter_localizations:
    sdk: flutter
  # State management — mirrors the backend's service layer on the client.
  flutter_riverpod: ^2.6.1
  # HTTP — talks to the FastAPI backend; one configured Dio with an auth interceptor.
  dio: ^5.7.0
  # Declarative routing with an auth-aware redirect guard.
  go_router: ^14.6.2
  # JWT is stored encrypted at rest (Keychain / Keystore), never in plain prefs.
  flutter_secure_storage: ^9.2.2
  # Money + date formatting. Amounts are integer đồng — formatted, never parsed as float.
  intl: any
  # Persists the chosen language (and other simple prefs).
  shared_preferences: ^2.3.3
  # Sign in with Google (web uses Google Identity Services).
  google_sign_in: ^6.2.1
  # Web-only: renderButton() for the GIS button (imported directly on web).
  google_sign_in_web: any
  # App version (shown in Settings / About).
  package_info_plus: ^8.1.1
  # Opening the publisher website.
  url_launcher: ^6.3.1
  # In-app WebView for the privacy policy (Android/iOS); web uses an iframe.
  webview_flutter: ^4.10.0
  # DOM interop for the web iframe fallback (HTMLIFrameElement).
  web: ^1.1.0
  # Charts on the statistics screen.
  fl_chart: ^0.69.2
  phone_form_field: ^10.0.17
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Generates the Android launcher icons from assets/icon/. Run with:
  #   dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true

# App launcher icon. `icon.png` is the full white-background logo (legacy icon);
# the adaptive icon uses a white background + a padded foreground so the round
# mask doesn't crop the logo.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
